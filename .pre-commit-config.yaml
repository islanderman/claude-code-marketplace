# Pre-commit configuration for Claude Code Template Project
# Optimized for markdown, YAML, shell scripts, and documentation
repos:
    # Core file system and syntax validation hooks
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          # File system security and integrity
          - id: check-added-large-files
            args: ['--maxkb=1000']
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
          - id: check-symlinks
          - id: check-merge-conflict
          - id: detect-private-key

          # File format validation (for configs and data)
          - id: check-json
          - id: check-toml
          - id: check-yaml
            args: ['--allow-multiple-documents']

          # File formatting and cleanup
          - id: end-of-file-fixer
            exclude: \.(svg|png|jpe?g|gif|ico|pdf)$
          - id: fix-byte-order-marker
          - id: mixed-line-ending
            args: ['--fix=lf']
          - id: trailing-whitespace
            args: ['--markdown-linebreak-ext=md']

    # Markdown linting and formatting
    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: v0.47.0
      hooks:
          - id: markdownlint
            args: ['--fix', '--disable', 'MD013', 'MD033', 'MD041']
            # MD013: Line length (disabled - code blocks can be long)
            # MD033: Inline HTML (disabled - needed for advanced formatting)
            # MD041: First line in file should be top-level heading (disabled)

    # Spell checking (with custom dictionary support)
    - repo: https://github.com/codespell-project/codespell
      rev: v2.4.1
      hooks:
          - id: codespell
            args:
                [
                    '--ignore-words-list=ultrathink,frontend,backend,parallelization,testng,aks,ACI,usre,iterm,bloc',
                ]
            exclude: ^(\.git/|\.venv/|node_modules/)

    # Shell script linting
    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.11.0.1
      hooks:
          - id: shellcheck
            args: ['--severity=warning']

    # YAML formatting
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v4.0.0-alpha.8
      hooks:
          - id: prettier
            types_or: [yaml, json, markdown]
            additional_dependencies: [prettier@3.1.1]
